name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: 3f2873419a5f498691ea9559c32a2a642ce3f2ef
          path: .deps/aoa-evals

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run agent validator
        run: python scripts/validate_agents.py

      - name: Run validator unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Rebuild published surfaces
        run: python scripts/build_published_surfaces.py

      - name: Check generated drift
        run: git diff --exit-code -- generated
