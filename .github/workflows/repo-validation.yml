name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    env:
      AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
      ABYSS_MACHINE_REPO_ROOT: ${{ github.workspace }}/.deps/abyss-machine
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@790457eb4806586c255c2b4a9ec4a8f08789a330

      - name: Checkout abyss-machine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          ref: 5724ce73cae69a0cd2b43996f006dc2bba2ab711
          path: .deps/abyss-machine

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: 3f2873419a5f498691ea9559c32a2a642ce3f2ef
          path: .deps/aoa-evals

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        run: python scripts/release_check.py
